<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Stitch - Entrenamiento en Curso</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#050062",
                        "background-light": "#f5f5f8",
                        "background-dark": "#100f23"
                    },
                    fontFamily: {
                        display: "Inter"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px"
                    }
                }
            }
        };
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-fill { font-variation-settings: 'FILL' 1; }
        .timer-glow { filter: drop-shadow(0 0 10px rgba(5, 0, 98, 0.4)); }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100">
    <div class="relative flex min-h-screen w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark shadow-2xl overflow-hidden">
        
        <!-- Live Status Bar -->
        <div class="bg-primary text-white px-4 py-2 flex items-center justify-between text-[10px] font-black uppercase tracking-[0.2em] relative z-20">
            <div class="flex items-center gap-2">
                <span class="flex h-2 w-2 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                </span>
                SESIÓN EN CURSO
            </div>
            <div id="active-dog-name">TOBY</div>
        </div>

        <!-- Header -->
        <div class="flex items-center bg-white dark:bg-slate-900 p-4 border-b border-primary/10">
            <h2 class="text-lg font-black tracking-tighter">Entrenamiento</h2>
            <div class="ml-auto flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">location_on</span>
                <span class="text-xs font-bold text-slate-500">Parque Central</span>
            </div>
        </div>

        <!-- Main Workspace -->
        <main class="flex-1 flex flex-col p-4">
            
            <!-- Timer Display -->
            <div class="flex flex-col items-center justify-center py-8">
                <div class="relative size-48 flex items-center justify-center">
                    <!-- Progress Ring -->
                    <svg class="absolute inset-0 size-full -rotate-90 transform" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="4" class="text-slate-100 dark:text-slate-800" />
                        <circle id="timer-progress" cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="4" stroke-dasharray="283" stroke-dashoffset="283" class="text-primary transition-all duration-1000 ease-linear" />
                    </svg>
                    <div class="flex flex-col items-center">
                        <span id="timer-display" class="text-5xl font-black tracking-tighter tabular-nums text-slate-900 dark:text-white timer-glow">00:00</span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Duración</span>
                    </div>
                </div>
            </div>

            <!-- Focus Meter -->
            <div class="mb-8">
                <div class="flex justify-between items-end mb-2">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Nivel de Enfoque</h3>
                    <span class="text-primary font-black">75%</span>
                </div>
                <div class="h-3 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden p-0.5">
                    <div class="h-full w-3/4 bg-primary rounded-full shadow-lg"></div>
                </div>
            </div>

            <!-- Training Interactions (Paseo style) -->
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button class="bg-emerald-50 hover:bg-emerald-100 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-400 border-2 border-emerald-100 dark:border-emerald-800 rounded-2xl p-5 flex flex-col items-center justify-center gap-2 active:scale-95 transition-all" onclick="showToast('¡Gran avance! Logro registrado.', 'star')">
                    <span class="text-3xl">🎉</span>
                    <span class="text-xs font-black uppercase tracking-wide">Logro</span>
                </button>
                <button class="bg-amber-50 hover:bg-amber-100 dark:bg-amber-900/20 text-amber-700 dark:text-amber-400 border-2 border-amber-100 dark:border-amber-800 rounded-2xl p-5 flex flex-col items-center justify-center gap-2 active:scale-95 transition-all" onclick="showToast('Pausa activada', 'pause_circle')">
                    <span class="text-3xl">🧘</span>
                    <span class="text-xs font-black uppercase tracking-wide">Pausa</span>
                </button>
            </div>

            <!-- Quick Log Chips -->
            <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar -mx-4 px-4 mb-4">
                <button class="shrink-0 px-4 py-2 bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-full text-[11px] font-bold shadow-sm" onclick="showToast('Distracción manejada', 'visibility_off')">#Distracciones</button>
                <button class="shrink-0 px-4 py-2 bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-full text-[11px] font-bold shadow-sm" onclick="showToast('Foco mantenido', 'center_focus_strong')">#Enfoque</button>
                <button class="shrink-0 px-4 py-2 bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-full text-[11px] font-bold shadow-sm" onclick="showToast('Reactividad baja', 'do_not_disturb_on')">#Reactividad</button>
            </div>

        </main>

        <!-- Finalize Session Overlay (Slide-to-finish style) -->
        <div class="p-4 bg-white dark:bg-slate-900 border-t border-primary/5 pb-10">
            <div class="relative h-16 bg-slate-100 dark:bg-slate-800 rounded-2xl flex items-center justify-center overflow-hidden border border-slate-200 dark:border-slate-700 group cursor-pointer" id="finish-slider">
                <div id="slider-progress" class="absolute left-0 top-0 bottom-0 bg-primary opacity-10 transition-all duration-300"></div>
                <div class="flex items-center gap-3 text-slate-400 font-black text-xs tracking-widest pointer-events-none select-none">
                    <span class="material-symbols-outlined animate-pulse">keyboard_double_arrow_right</span>
                    DESLIZAR PARA FINALIZAR
                </div>
                <!-- The actual handle will be a full width overlay for simple interactive feel -->
                <button class="absolute inset-0 z-10 opacity-0 cursor-pointer" onmousedown="startFinish()" onmouseup="endFinish()" ontouchstart="startFinish()" ontouchend="endFinish()"></button>
            </div>
        </div>

        <!-- Toast Notification -->
        <div class="fixed top-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full flex items-center gap-3 shadow-2xl z-[100] transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none" id="toast">
            <span class="material-symbols-outlined text-green-400" id="toast-icon">check_circle</span>
            <span class="text-sm font-semibold truncate max-w-[200px]" id="toast-message">Acción realizada</span>
        </div>

    </div>

    <script>
        // Timer Logic
        let seconds = 0;
        const timerDisplay = document.getElementById('timer-display');
        const progressRing = document.getElementById('timer-progress');
        const totalDuration = 3600; // 1 hour for progress ring scale

        function updateTimer() {
            seconds++;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timerDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            // Update progress ring (approximation)
            const offset = 283 - (seconds / totalDuration) * 283;
            progressRing.style.strokeDashoffset = Math.max(0, offset);
        }
        setInterval(updateTimer, 1000);

        // Slide to finish simulation
        let finishTimeout;
        function startFinish() {
            document.getElementById('slider-progress').style.width = '100%';
            document.getElementById('slider-progress').style.opacity = '1';
            finishTimeout = setTimeout(() => {
                window.location.href = '../reporte_entrenamiento/code.html';
            }, 1000);
        }
        function endFinish() {
            clearTimeout(finishTimeout);
            document.getElementById('slider-progress').style.width = '0%';
            document.getElementById('slider-progress').style.opacity = '0.1';
        }

        // URL Handling
        const params = new URLSearchParams(window.location.search);
        const dog = params.get('dog');
        if (dog) document.getElementById('active-dog-name').textContent = dog.toUpperCase();

        // Toast logic (consistent with app)
        let toastTimeout;
        function showToast(message, icon) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = message;
            document.getElementById('toast-icon').textContent = icon || 'check_circle';
            clearTimeout(toastTimeout);
            toast.classList.remove('opacity-0', '-translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', '-translate-y-4');
            }, 2000);
        }
    </script>
</body>
</html>
