<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#050062",
                        "background-light": "#f5f5f8",
                        "background-dark": "#100f23",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <title>Solicitud de Cobro</title>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .fill-icon { font-variation-settings: 'FILL' 1; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(16, 15, 35, 0.7); }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="relative flex min-h-screen flex-col overflow-x-hidden max-w-md mx-auto bg-white dark:bg-background-dark shadow-2xl">
        
        <!-- Header -->
        <header class="sticky top-0 z-50 px-6 py-6 flex items-center justify-between">
            <button class="size-10 flex items-center justify-center rounded-2xl bg-slate-50 dark:bg-slate-800 text-primary" onclick="history.back()">
                <span class="material-symbols-outlined">close</span>
            </button>
            <h1 class="text-sm font-black uppercase tracking-widest text-slate-400">Solicitud de Pago</h1>
            <div class="size-10"></div>
        </header>

        <main class="flex-1 px-8 pt-4 pb-32 flex flex-col items-center text-center">
            <!-- Icon/Visual -->
            <div class="relative mb-10">
                <div class="size-32 rounded-[2.5rem] bg-rose-500 flex items-center justify-center text-white shadow-2xl shadow-rose-500/40 relative z-10 animate-bounce">
                    <span class="material-symbols-outlined text-[64px] fill-icon">request_quote</span>
                </div>
                <div class="absolute inset-0 size-32 bg-rose-500/20 rounded-[2.5rem] blur-2xl -z-0"></div>
            </div>

            <div class="space-y-2 mb-8">
                <p class="text-[10px] font-black uppercase tracking-[0.2em] text-rose-500">Cobro pendiente</p>
                <h2 class="text-5xl font-black italic tracking-tighter" id="display-amount">$350.00</h2>
                <p class="text-sm font-bold text-slate-400" id="display-client">Para Juan Pérez</p>
            </div>

            <!-- Card Info -->
            <div class="w-full space-y-4">
                <div class="bg-slate-50 dark:bg-slate-800/50 rounded-3xl p-6 border-2 border-transparent hover:border-primary/10 transition-all text-left space-y-4">
                    <div class="flex items-center gap-4">
                        <div class="size-12 rounded-2xl bg-primary/10 text-primary flex items-center justify-center">
                            <span class="material-symbols-outlined">event_available</span>
                        </div>
                        <div>
                            <p class="text-[10px] font-black uppercase text-slate-400 tracking-wider">Concepto</p>
                            <p class="text-sm font-extrabold italic">Sesión de entrenamiento #3</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="size-12 rounded-2xl bg-primary/10 text-primary flex items-center justify-center">
                            <span class="material-symbols-outlined">credit_card</span>
                        </div>
                        <div>
                            <p class="text-[10px] font-black uppercase text-slate-400 tracking-wider">Método Sugerido</p>
                            <p class="text-sm font-extrabold italic">Transferencia SPEI / Link</p>
                        </div>
                    </div>
                </div>

                <!-- Payment Link Selector -->
                <div class="space-y-3 pt-4">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 text-left block ml-1">Comparte el link de pago</label>
                    <div class="flex gap-2">
                        <button class="flex-1 py-4 bg-[#25D366] text-white rounded-2xl font-black text-xs flex items-center justify-center gap-2 shadow-lg shadow-[#25D366]/20 active:scale-95 transition-all" onclick="sharePayment('WhatsApp')">
                            <span class="material-symbols-outlined text-lg">chat</span>
                            WHATSAPP
                        </button>
                        <button class="flex-1 py-4 bg-primary text-white rounded-2xl font-black text-xs flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-95 transition-all" onclick="sharePayment('Copiado')">
                            <span class="material-symbols-outlined text-lg">content_copy</span>
                            COPIAR LINK
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer Action -->
        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-8 pb-10 z-50">
            <button class="w-full py-5 rounded-3xl bg-slate-900 dark:bg-white dark:text-slate-900 text-white font-black text-sm tracking-widest shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-3" onclick="confirmPayment()">
                <span class="material-symbols-outlined">verified</span>
                MARCAR COMO PAGADO
            </button>
        </div>

        <!-- Toast -->
        <div class="fixed top-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full flex items-center gap-3 shadow-2xl z-[100] transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none" id="toast">
            <span class="material-symbols-outlined text-emerald-400" id="toast-icon">check_circle</span>
            <span class="text-sm font-semibold truncate max-w-[200px]" id="toast-message">Link compartido</span>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const amount = urlParams.get('amount') || '350.00';
        const client = urlParams.get('client') || 'Cliente';

        document.getElementById('display-amount').textContent = `$${amount}.00`;
        document.getElementById('display-client').textContent = `Para ${client}`;

        function sharePayment(method) {
            showToast(`${method} exitoso`, method === 'WhatsApp' ? 'chat' : 'content_copy');
        }

        function confirmPayment() {
            showToast('Pago confirmado', 'verified');
            setTimeout(() => {
                window.location.href = '../lista_clientes/code.html';
            }, 1500);
        }

        let toastTimeout;
        function showToast(m, i) {
            const t = document.getElementById('toast');
            document.getElementById('toast-message').textContent = m;
            document.getElementById('toast-icon').textContent = i || 'check_circle';
            clearTimeout(toastTimeout);
            t.classList.remove('opacity-0', '-translate-y-4');
            t.classList.add('opacity-100', 'translate-y-0');
            toastTimeout = setTimeout(() => {
                t.classList.remove('opacity-100', 'translate-y-0');
                t.classList.add('opacity-0', '-translate-y-4');
            }, 3000);
        }
    </script>
</body>
</html>
